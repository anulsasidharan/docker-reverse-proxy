services:
  frontend:
    build: ./frontend
    networks: [app-net]

  backend:
    build: ./backend
    networks: [app-net]

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [frontend, backend]
    networks: [app-net]

networks:
  app-net:
