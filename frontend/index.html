<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nginx Reverse Proxy Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 { font-size: 2rem; font-weight: 700; color: #7dd3fc; }
    header p  { margin-top: 8px; color: #94a3b8; font-size: 0.95rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #1e2330;
      border: 1px solid #2d3448;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .get    { background: #0d3d2e; color: #34d399; border: 1px solid #34d399; }
    .put    { background: #3d2e0d; color: #fbbf24; border: 1px solid #fbbf24; }
    .delete { background: #3d0d0d; color: #f87171; border: 1px solid #f87171; }

    .endpoint { font-size: 0.9rem; color: #cbd5e1; font-family: monospace; }

    input[type="number"], input[type="text"], textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3448;
      border-radius: 6px;
      padding: 8px 10px;
      color: #e2e8f0;
      font-size: 0.85rem;
    }
    textarea { resize: vertical; min-height: 70px; font-family: monospace; }

    button {
      padding: 9px 16px;
      border: none;
      border-radius: 7px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-get    { background: #34d399; color: #0d1f17; }
    .btn-put    { background: #fbbf24; color: #1f1400; }
    .btn-delete { background: #f87171; color: #1f0000; }

    .response {
      background: #0f1117;
      border: 1px solid #2d3448;
      border-radius: 6px;
      padding: 12px;
      font-family: monospace;
      font-size: 0.8rem;
      color: #a3e635;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 48px;
    }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      background: #94a3b8;
    }
    .status-dot.ok     { background: #34d399; box-shadow: 0 0 6px #34d399; }
    .status-dot.error  { background: #f87171; box-shadow: 0 0 6px #f87171; }
  </style>
</head>
<body>

<header>
  <h1>Nginx Reverse Proxy</h1>
  <p>Requests from this page are proxied by Nginx to the backend container.</p>
</header>

<div class="grid">

  <!-- GET /api/hello -->
  <div class="card">
    <div class="card-title">Greeting</div>
    <div><span class="badge get">GET</span></div>
    <div class="endpoint">/api/hello</div>
    <button class="btn-get" onclick="call('hello', 'GET', '/api/hello')">Send</button>
    <div class="response" id="res-hello">–</div>
  </div>

  <!-- GET /api/health -->
  <div class="card">
    <div class="card-title">Health Check</div>
    <div><span class="badge get">GET</span></div>
    <div class="endpoint">/api/health</div>
    <button class="btn-get" onclick="call('health', 'GET', '/api/health')">Send</button>
    <div class="response" id="res-health">–</div>
  </div>

  <!-- PUT /api/items/:id -->
  <div class="card">
    <div class="card-title">Update Item</div>
    <div><span class="badge put">PUT</span></div>
    <div class="endpoint">/api/items/:id</div>
    <input type="number" id="put-id" value="1" min="1" placeholder="Item ID" />
    <textarea id="put-body">{"name": "Widget", "price": 9.99}</textarea>
    <button class="btn-put" onclick="callPut()">Send</button>
    <div class="response" id="res-put">–</div>
  </div>

  <!-- DELETE /api/items/:id -->
  <div class="card">
    <div class="card-title">Delete Item</div>
    <div><span class="badge delete">DELETE</span></div>
    <div class="endpoint">/api/items/:id</div>
    <input type="number" id="del-id" value="1" min="1" placeholder="Item ID" />
    <button class="btn-delete" onclick="callDelete()">Send</button>
    <div class="response" id="res-delete">–</div>
  </div>

</div>

<script>
  async function call(key, method, url, body) {
    const el = document.getElementById('res-' + key);
    el.textContent = 'Loading…';
    try {
      const opts = { method, headers: {} };
      if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = body;
      }
      const res  = await fetch(url, opts);
      const data = await res.json();
      el.textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      el.textContent = 'Error: ' + err.message;
    }
  }

  function callPut() {
    const id   = document.getElementById('put-id').value;
    const body = document.getElementById('put-body').value;
    call('put', 'PUT', `/api/items/${id}`, body);
  }

  function callDelete() {
    const id = document.getElementById('del-id').value;
    call('delete', 'DELETE', `/api/items/${id}`);
  }

  // Auto-run GETs on load
  call('hello',  'GET', '/api/hello');
  call('health', 'GET', '/api/health');
</script>

</body>
</html>
